# Fly.io config. SINGLE instance only — SQLite is a single-writer file on the volume below.
# Do not `fly scale count >1`. Secrets (set via `fly secrets set`): ANTHROPIC_API_KEY,
# AUTH_SECRET, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET, NEXTAUTH_URL/AUTH_URL.

app = "hanzi-graded-reader"
primary_region = "syd"
# Grace period after SIGTERM before SIGKILL — time for instrumentation.ts to checkpoint the WAL and
# close SQLite cleanly before a scale-to-zero stop. (Top-level machine setting, not [http_service].)
kill_timeout = "10s"

[build]

[env]
  DB_PATH = "/data/hanzi.db"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle by SUSPENDING (freeze RAM → fast resume) rather than stopping.
  # Still a SINGLE instance — suspend/resume keeps the one SQLite writer; do not scale count >1.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "hanzi_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
